services:
  template-service:
    container_name: template-service
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: template
      DB_USER: root
      DB_PASSWORD: ""
    depends_on:
      mariadb:
        condition: service_healthy

  mariadb:
    container_name: template-service-mariadb
    image: mariadb:11
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: template
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-uroot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  mariadb_data:
