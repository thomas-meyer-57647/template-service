spring.application.name=template-service
server.port=${TEMPLATEPORT:8104}
server.servlet.context-path=/api/v1

spring.datasource.url=jdbc:mariadb://${TEMPLATE_DB_HOST:localhost}:${TEMPLATE_DB_PORT:3306}/${TEMPLATE_DB_NAME:template}
spring.datasource.username=${TEMPLATE_DB_USER:root}
spring.datasource.password=${TEMPLATE_DB_PASSWORD:}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true

springdoc.swagger-ui.path=/swagger-ui.html

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${SECURITY_JWT_JWK_SET_URI:http://localhost:9000/oauth2/jwks}
security.jwt.issuer=${SECURITY_JWT_ISSUER:}
security.jwt.audience=${SECURITY_JWT_AUDIENCE:template-service}
security.jwt.clock-skew-seconds=${SECURITY_JWT_CLOCK_SKEW_SECONDS:60}

template.resolve.default-locale=${TEMPLATE_DEFAULT_LOCALE:en-GB}
template.cache.ttl-seconds=${TEMPLATE_CACHE_TTL_SECONDS:120}
template.events.enabled=${TEMPLATE_EVENTS_ENABLED:false}
