server.servlet.context-path=/api/v1

spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true

spring.datasource.url=jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:template}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost/mock-jwks
template.resolve.default-locale=en-GB
template.cache.ttl-seconds=120
template.events.enabled=false
